name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          BIN_NAME="arxiv_mcp"
          TARGET_DIR="target/${{ matrix.target }}/release"
          RELEASE_DIR="release"

          # 确保 release 目录存在
          mkdir -p $RELEASE_DIR

          # 切换到 target release 目录
          cd $TARGET_DIR

          # 列出文件用于调试
          ls -la

          # 确认二进制文件存在
          if [ ! -f "$BIN_NAME" ] && [ ! -f "$BIN_NAME.exe" ]; then
            echo "Error: Binary not found!"
            exit 1
          fi

          # 打包
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            zip $RELEASE_DIR/arxiv_mcp-${{ matrix.target }}${{ matrix.ext }}.zip $BIN_NAME.exe
          else
            tar -czvf ../../../$RELEASE_DIR/arxiv_mcp-${{ matrix.target }}.tar.gz $BIN_NAME
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
