name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $BIN_NAME = "arxiv_mcp"
          $TARGET_DIR = "target/${{ matrix.target }}/release"
          $RELEASE_DIR = "release"

          New-Item -ItemType Directory -Force -Path $RELEASE_DIR | Out-Null

          if (-not (Test-Path "$TARGET_DIR\$BIN_NAME.exe")) {
            Write-Host "Error: Binary not found!"
            exit 1
          }

          Compress-Archive -Path "$TARGET_DIR\$BIN_NAME.exe" -DestinationPath "$RELEASE_DIR\arxiv_mcp-${{ matrix.target }}.zip" -Force

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          BIN_NAME="arxiv_mcp"
          TARGET_DIR="target/${{ matrix.target }}/release"
          RELEASE_DIR="release"

          mkdir -p $RELEASE_DIR
          cd $TARGET_DIR

          if [ ! -f "$BIN_NAME" ]; then
            echo "Error: Binary not found!"
            exit 1
          fi

          # 打包
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            zip $RELEASE_DIR/arxiv_mcp-${{ matrix.target }}${{ matrix.ext }}.zip $BIN_NAME.exe
          else
            tar -czvf ../../../$RELEASE_DIR/arxiv_mcp-${{ matrix.target }}.tar.gz $BIN_NAME
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
